services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: zerohunger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: zerohunger
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_TYPE: postgresql+asyncpg
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
