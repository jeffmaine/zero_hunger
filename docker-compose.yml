services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: zerohunger
      POSTGRES_USER: postgres
      # POSTGRES_PASSWORD from backend/.env (set equal to DB_PASSWORD)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zerohunger"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Do not publish 5432 on EC2 — API reaches db via Docker network only.

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: zerohunger
      DB_TYPE: postgresql+asyncpg
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
